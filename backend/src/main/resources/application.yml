spring:
  application:
    name: cookbook-backend

  datasource:
    url: jdbc:h2:mem:cookbookdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

ai:
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:stub}
    model: claude-sonnet-5

logging:
  level:
    com.cookbook: DEBUG
